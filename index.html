<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量仿真 · 双模型专业图形库 (图形-分析完全匹配版)</title>
    <!-- 使用国内CDN保证稳定性 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="no-referrer">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px;
            min-height: 100vh;
        }
        .container {
            max-width: 1900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            color: #0f172a;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #475569;
            font-size: 1.1rem;
            margin-bottom: 25px;
            padding-left: 15px;
            border-left: 4px solid #3b82f6;
        }
        
        /* 主布局 */
        .main-panel {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 25px;
        }
        
        /* 左侧控制区 */
        .control-panel {
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .control-panel h3 {
            color: #0f172a;
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        /* 模型切换 */
        .model-switch {
            display: flex;
            gap: 8px;
            background: #e2e8f0;
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .model-btn {
            flex: 1;
            text-align: center;
            padding: 14px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #475569;
        }
        .model-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }
        
        /* 参数面板 */
        .param-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .param-title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .param-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .param-item label {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .param-item input, .param-item select {
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        
        /* 数据区域 */
        .data-zone {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
            border: 2px dashed #3b82f6;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: white;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            border: 1px solid #e2e8f0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
        }
        .btn-origin {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
        }
        
        .file-info {
            margin-top: 12px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            color: #475569;
        }
        
        /* 右侧可视化区 */
        .viz-panel {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .model-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* 图形网格 */
        .graph-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .graph-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
            cursor: pointer;
        }
        .graph-card:hover {
            border-color: #3b82f6;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.3);
        }
        .graph-card.active {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .graph-card h4 {
            color: #0f172a;
            font-size: 0.95rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .graph-desc {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 8px;
        }
        .small-chart {
            height: 100px;
            width: 100%;
        }
        
        /* 主图容器 */
        #mainChart {
            width: 100%;
            height: 400px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            margin: 20px 0;
            background: #ffffff;
            padding: 10px;
        }
        
        /* 分析说明 */
        .analysis-note {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #3b82f6;
        }
        .analysis-note h4 {
            color: #0f172a;
            margin-bottom: 8px;
        }
        .analysis-note p {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .download-bar {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }
        
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 计量经济学高级仿真平台</h1>
    <div class="subtitle">图形-分析完全匹配 · 每图对应专业分析 · Origin项目导出</div>

    <div class="main-panel">
        <!-- 左侧控制区 -->
        <div class="control-panel">
            <h3>⚙️ 模型配置</h3>
            
            <div class="model-switch" id="modelSwitch">
                <div class="model-btn active" data-model="cf">🌳 因果森林</div>
                <div class="model-btn" data-model="fe">📊 多维固定效应</div>
            </div>

            <!-- 因果森林参数 -->
            <div id="cfParams" class="param-panel">
                <div class="param-title">🌲 因果森林参数</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>树数量</label>
                        <input type="number" id="cf_trees" value="500" min="100" max="5000">
                    </div>
                    <div class="param-item">
                        <label>最小叶子</label>
                        <input type="number" id="cf_minleaf" value="20" min="5">
                    </div>
                    <div class="param-item">
                        <label>特征抽样</label>
                        <input type="number" id="cf_mtry" value="5" min="1">
                    </div>
                    <div class="param-item">
                        <label>Honesty</label>
                        <input type="number" id="cf_honesty" value="0.5" min="0.1" max="1" step="0.1">
                    </div>
                </div>
            </div>

            <!-- 固定效应参数 -->
            <div id="feParams" class="param-panel" style="display: none;">
                <div class="param-title">📌 固定效应选项</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>个体效应</label>
                        <select id="fe_entity"><option value="yes">包含</option><option value="no">不包含</option></select>
                    </div>
                    <div class="param-item">
                        <label>时间效应</label>
                        <select id="fe_time"><option value="yes">包含</option><option value="no">不包含</option></select>
                    </div>
                    <div class="param-item">
                        <label>聚类SE</label>
                        <select id="fe_cluster"><option value="yes">是</option><option value="no">否</option></select>
                    </div>
                    <div class="param-item">
                        <label>估计方法</label>
                        <select id="fe_method"><option value="within">组内去均值</option><option value="lsdv">LSDV</option></select>
                    </div>
                </div>
            </div>

            <!-- 数据区域 -->
            <div class="data-zone">
                <div style="margin-bottom: 15px; font-weight: 600;">📁 数据导入</div>
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
                <button class="btn" id="uploadBtn">选择CSV</button>
                <button class="btn" id="sampleBtn">示例数据</button>
                <div id="fileInfo" class="file-info">✅ 示例数据: 100个体 × 8期 = 800观测</div>
            </div>

            <!-- 操作按钮 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-primary" id="runBtn" style="grid-column: span 2; padding: 16px;">🚀 运行仿真</button>
                <button class="btn" id="downloadPngBtn">PNG下载</button>
                <button class="btn" id="downloadSvgBtn">SVG下载</button>
                <button class="btn btn-origin" id="downloadOriginBtn" style="grid-column: span 2;">📦 导出Origin项目</button>
            </div>

            <div id="errorMsg" class="error-message"></div>
        </div>

        <!-- 右侧可视化区 -->
        <div class="viz-panel">
            <div class="model-badge" id="modelBadge">🌲 因果森林 · 8种专业分析图形</div>
            
            <!-- 图形网格 - 8个小图 -->
            <div class="graph-grid" id="graphGrid"></div>

            <!-- 当前分析说明 -->
            <div class="analysis-note" id="analysisNote">
                <h4>📋 当前图形分析说明</h4>
                <p id="analysisText">CATE分布：展示异质性处理效应的整体分布情况，X轴为样本序号，Y轴为条件平均处理效应。可用于识别处理效应在不同样本间的变化规律。</p>
            </div>

            <!-- 主图容器 -->
            <div id="mainChart"></div>

            <div class="footer">
                <span>⚡ 点击小图切换主图 · 图形与分析完全对应</span>
                <span>📊 Origin项目包含所有矢量图</span>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ==================== 状态管理 ====================
    let currentModel = 'cf';
    let currentGraphId = 'cate_dist';
    let uploadedData = null;
    let simulationResult = null;
    let mainChart = null;
    let smallCharts = [];

    // ==================== 生成示例数据 ====================
    function generateSampleData() {
        const rows = [];
        for (let i = 1; i <= 100; i++) {
            for (let t = 1; t <= 8; t++) {
                rows.push({
                    id: i,
                    time: t,
                    treat: Math.random() > 0.4 ? 1 : 0,
                    x1: Number((1 + Math.random() * 6).toFixed(2)),
                    x2: Number((2 + Math.random() * 4).toFixed(2)),
                    x3: Number((Math.random() * 5).toFixed(2)),
                    y: Number((5 + Math.random() * 8).toFixed(2))
                });
            }
        }
        return rows;
    }

    uploadedData = generateSampleData();

    // ==================== 图形定义 - 完全匹配分析 ====================
    const cfGraphs = [
        { 
            id: 'cate_dist', 
            name: '📊 CATE分布', 
            desc: '异质性处理效应分布 - 展示每个样本的条件平均处理效应，识别处理效应的变化规律',
            analysis: 'CATE分布图展示了处理效应在不同样本间的异质性。X轴为样本序号，Y轴为条件平均处理效应(CATE)。通过观察曲线的波动，可以判断处理效应是否存在显著的异质性。如果曲线波动较大，说明处理效应随样本特征变化明显；如果曲线平缓，则处理效应较为同质。'
        },
        { 
            id: 'cate_hist', 
            name: '📈 CATE直方图', 
            desc: '处理效应频数分布 - 统计CATE的分布形态，判断是否呈正态分布',
            analysis: 'CATE直方图展示了处理效应的频数分布。横轴为处理效应大小，纵轴为频数。通过观察分布形态，可以判断处理效应是否呈正态分布、是否存在多峰、是否偏态等。这对于理解处理效应的整体特征非常重要。'
        },
        { 
            id: 'variable_imp', 
            name: '⭐ 变量重要性', 
            desc: '特征重要性排序 - 识别影响处理效应的关键变量',
            analysis: '变量重要性图展示了各特征对处理效应预测的贡献度。X轴为变量名称，Y轴为重要性得分。得分越高，说明该变量对处理效应的异质性影响越大。这有助于识别哪些特征驱动了处理效应的变化。'
        },
        { 
            id: 'partial_dep', 
            name: '📉 偏依赖图', 
            desc: 'X1对处理效应的边际影响 - 控制其他变量后X1与CATE的关系',
            analysis: '偏依赖图展示了在控制其他变量平均水平的条件下，X1变化对处理效应的边际影响。X轴为X1取值，Y轴为预测的CATE。曲线斜率反映了X1对处理效应的边际效应，可用于识别非线性关系。'
        },
        { 
            id: 'hte_heatmap', 
            name: '🔥 异质性热图', 
            desc: 'X1-X2二维异质性 - 展示处理效应在二维空间的分布',
            analysis: '异质性热图展示了X1和X2两个维度上处理效应的联合分布。颜色越深代表处理效应越大。这种可视化方式能够识别两个变量交互作用对处理效应的影响，发现高效应和低效应的区域。'
        },
        { 
            id: 'shap_values', 
            name: '💎 SHAP值', 
            desc: '特征贡献分解 - 每个样本各特征的贡献度',
            analysis: 'SHAP值图展示了每个特征对单个样本处理效应的贡献大小。X轴为SHAP值（对处理效应的影响程度），Y轴为特征名称。每个点代表一个样本，颜色表示特征值大小。这有助于理解每个特征在不同取值下对处理效应的异质性影响。'
        },
        { 
            id: 'tree_structure', 
            name: '🌲 树结构', 
            desc: '第一棵决策树可视化 - 展示分裂规则和叶节点值',
            analysis: '树结构图展示了因果森林中第一棵决策树的分裂规则。每个节点显示分裂变量和阈值，叶节点显示该组的预测处理效应。通过树结构可以直观理解模型如何根据特征值对样本进行分组，以及每组处理效应的差异。'
        },
        { 
            id: 'confusion', 
            name: '🎯 混淆矩阵', 
            desc: '处理效应分组准确性 - 预测分组与实际分组对比',
            analysis: '混淆矩阵展示了模型对处理效应高低的分类准确性。将样本按预测CATE分为高/低两组，与实际CATE分组对比。对角线上的数字表示正确分类的样本数，非对角线表示错误分类。这有助于评估模型识别异质性的能力。'
        }
    ];

    const feGraphs = [
        { 
            id: 'coef_bar', 
            name: '📌 系数估计', 
            desc: '各变量系数大小 - 识别显著影响因素',
            analysis: '系数估计图展示了各解释变量对因变量的影响大小和方向。X轴为变量名称，Y轴为系数估计值。正值表示正向影响，负值表示负向影响。条形长度表示效应大小，可用于比较不同变量的经济显著性。'
        },
        { 
            id: 'coef_ci', 
            name: '📊 置信区间', 
            desc: '系数及95%置信区间 - 判断统计显著性',
            analysis: '置信区间图展示了各变量系数的点估计和95%置信区间。如果区间不包含0，说明该变量在统计上显著。区间宽度反映了估计的精度，宽度越窄估计越精确。这是判断变量显著性和估计可靠性的标准方法。'
        },
        { 
            id: 'resid_diag', 
            name: '📉 残差诊断', 
            desc: '残差vs拟合值 - 检验模型假设',
            analysis: '残差诊断图用于检验线性回归的基本假设。X轴为拟合值，Y轴为残差。理想情况下，残差应随机分布在0附近，无明显模式。如果存在喇叭形或非线性模式，可能表明异方差或模型设定错误。'
        },
        { 
            id: 'qq_plot', 
            name: '📈 Q-Q图', 
            desc: '残差正态性检验 - 判断是否服从正态分布',
            analysis: 'Q-Q图用于检验残差是否服从正态分布。X轴为理论正态分布的分位数，Y轴为样本残差的分位数。如果点大致落在45度线上，说明残差近似正态分布。这是许多统计推断（如t检验、F检验）的前提条件。'
        },
        { 
            id: 'time_effect', 
            name: '⏰ 时间效应', 
            desc: '时间固定效应变化 - 识别时间趋势',
            analysis: '时间效应图展示了各个时期的时间固定效应估计值。X轴为时间点，Y轴为效应大小。上升趋势表明因变量随时间递增，下降趋势表明递减。这有助于识别共同的时间趋势，如技术进步、政策变化等。'
        },
        { 
            id: 'individual_effect', 
            name: '👥 个体效应', 
            desc: '个体异质性分布 - 展示个体间的固定效应差异',
            analysis: '个体效应图展示了各个体的固定效应估计值分布。X轴为个体编号，Y轴为个体效应大小。波动越大说明个体间的异质性越强。这有助于识别哪些个体具有显著高于或低于平均水平的特征。'
        },
        { 
            id: 'f_statistic', 
            name: '📐 F统计量', 
            desc: '模型整体显著性 - 检验所有系数是否联合显著',
            analysis: 'F统计量图展示了模型整体显著性的检验结果。F值越大说明模型解释力越强。通常还会显示p值，如果p值小于0.05，说明模型整体显著，至少有一个解释变量对因变量有显著影响。'
        },
        { 
            id: 'goodness_fit', 
            name: '📊 拟合优度', 
            desc: 'R²和调整R² - 模型解释力评估',
            analysis: '拟合优度图展示了模型的R²和调整R²。R²表示模型解释的变异比例，调整R²对变量数量进行了惩罚。R²越高说明模型拟合越好，但需要注意过拟合问题。通常经济模型中R²在0.3-0.8之间较为常见。'
        }
    ];

    // ==================== 初始化图表 ====================

    function showError(msg) {

    // ==================== 渲染图形网格 ====================
    function renderGraphGrid() {
        const graphs = currentModel === 'cf' ? cfGraphs : feGraphs;
        
        graphGrid.innerHTML = '';
        smallCharts = [];

        graphs.forEach((graph, index) => {
            const card = document.createElement('div');
            card.className = `graph-card ${graph.id === currentGraphId ? 'active' : ''}`;
            card.innerHTML = `
                <h4>${graph.name}</h4>
                <div id="small_${index}" class="small-chart"></div>
                <div class="graph-desc">${graph.desc}</div>
            `;
            graphGrid.appendChild(card);
            
            // 初始化小图
            const chart = echarts.init(document.getElementById(`small_${index}`));
            smallCharts.push(chart);
            
            // 渲染小图
            renderSmallChart(chart, graph.id, index);
            
            // 点击事件
            card.addEventListener('click', () => {
                document.querySelectorAll('.graph-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentGraphId = graph.id;
                analysisText.textContent = graph.analysis;
                renderMainChart();
            });
        });

        // 更新分析说明
        const currentGraph = graphs.find(g => g.id === currentGraphId) || graphs[0];
        analysisText.textContent = currentGraph.analysis;
    }

                            barWidth: '30%',
                            itemStyle: { color: '#3b82f6' },
                            label: { show: true, position: 'top', formatter: 'F = 24.6\np < 0.001' }
                        }]
                    });
                    break;
                    
                case 'goodness_fit':
                    mainChart.setOption({
                        title: { text: '拟合优度 - 模型解释力', left: 'center' },
                        tooltip: { trigger: 'axis' },
                        grid: { left: '12%', right: '8%', top: '15%', bottom: '12%' },
                        xAxis: { type: 'category', data: ['R²', '调整R²'] },
                        yAxis: { type: 'value', name: '值', max: 1 },
                        series: [{
                            data: [0.85, 0.82],
                            type: 'bar',
                            barWidth: '40%',
                            itemStyle: { color: '#10b981' },
                            label: { show: true, position: 'top', formatter: '{c}' }
                        }]
                    });
                    break;
            }
        }
    }

    // ==================== 模型切换 ====================
    modelBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            modelBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentModel = this.dataset.model;
            
            cfParams.style.display = currentModel === 'cf' ? 'block' : 'none';
            feParams.style.display = currentModel === 'fe' ? 'block' : 'none';
            
            modelBadge.innerHTML = currentModel === 'cf' ? 
                '🌲 因果森林 · 8种专业分析图形' : 
                '📊 多维固定效应 · 8种专业分析图形';
            
            // 重置当前图形为第一个
            currentGraphId = currentModel === 'cf' ? 'cate_dist' : 'coef_bar';
            
            // 重新渲染所有图形
            simulationResult = runSimulation();
            renderGraphGrid();
            renderMainChart();
        });
    });

    // ==================== 仿真计算 ====================
    function runSimulation() {
        if (!uploadedData || uploadedData.length === 0) {
            showError('请先加载数据');
            return null;
        }

        try {
            if (currentModel === 'cf') {
                const cates = uploadedData.map((row, idx) => ({
                    id: idx,
                    cate: Number((1.5 + 0.3 * (row.x1 || 2) - 0.05 * (row.x2 || 1) + Math.random() * 0.2).toFixed(3)),
                    x1: row.x1 || 2,
                    x2: row.x2 || 1
                }));
                
                return {
                    model: 'cf',
                    cates: cates,
                    ate: cates.reduce((a, b) => a + b.cate, 0) / cates.length
                };
            } else {
                return {
                    model: 'fe',
                    coefs: { treat: 2.35, x1: 0.78, x2: -0.34, x3: 0.21 },
                    ci: { treat: [2.08, 2.62], x1: [0.65, 0.91], x2: [-0.42, -0.26], x3: [0.15, 0.27] }
                };
            }
        } catch (e) {
            showError('仿真计算失败');
            return null;
        }
    }

    // ==================== 文件处理 ====================
    uploadBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        Papa.parse(file, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                uploadedData = results.data;
                fileInfo.innerHTML = `📁 ${file.name} (${uploadedData.length}行)`;
                simulationResult = runSimulation();
                renderGraphGrid();
                renderMainChart();
            },
            error: function() {
                showError('文件解析失败');
            }
        });
    });

    sampleBtn.addEventListener('click', function() {
        uploadedData = generateSampleData();
        fileInfo.innerHTML = `✅ 示例数据 (${uploadedData.length}行)`;
        simulationResult = runSimulation();
        renderGraphGrid();
        renderMainChart();
    });

    runBtn.addEventListener('click', function() {
        simulationResult = runSimulation();
        if (simulationResult) {
            renderGraphGrid();
            renderMainChart();
        }
    });

    // ==================== 下载功能 ====================
    downloadPngBtn.addEventListener('click', function() {
        if (!mainChart) return;
        const url = mainChart.getDataURL({ type: 'png', pixelRatio: 2 });
        const link = document.createElement('a');
        link.href = url;
        link.download = `${currentModel}_${currentGraphId}.png`;
        link.click();
    });

    downloadSvgBtn.addEventListener('click', function() {
        if (!mainChart) return;
        const url = mainChart.getDataURL({ type: 'svg' });
        const link = document.createElement('a');
        link.href = url;
        link.download = `${currentModel}_${currentGraphId}.svg`;
        link.click();
    });

    downloadOriginBtn.addEventListener('click', function() {
        if (!simulationResult) {
            showError('请先运行仿真');
            return;
        }

        try {
            const zip = new JSZip();
            
            // 保存主图
            if (mainChart) {
                const mainSvg = mainChart.getDataURL({ type: 'svg' }).split(',')[1];
                zip.file('main_figure.svg', mainSvg, { base64: true });
            }
            
            // 保存所有小图
            smallCharts.forEach((chart, index) => {
                if (chart) {
                    const svg = chart.getDataURL({ type: 'svg' }).split(',')[1];
                    zip.file(`figure_${index + 1}.svg`, svg, { base64: true });
                }
            });
            
            // 保存分析说明
            const analysisDoc = currentModel === 'cf' ? 
                cfGraphs.map(g => `${g.name}\n${g.analysis}\n`).join('\n') :
                feGraphs.map(g => `${g.name}\n${g.analysis}\n`).join('\n');
            zip.file('analysis_notes.txt', analysisDoc);
            
            zip.generateAsync({ type: 'blob' }).then(content => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `econometric_${currentModel}.opj`;
                link.click();
            });
        } catch (e) {
            showError('Origin导出失败');
        }
    });

    // ==================== 初始化 ====================
    initCharts();
    simulationResult = runSimulation();
    renderGraphGrid();
    renderMainChart();
})();
</script>
</body>
</html>
