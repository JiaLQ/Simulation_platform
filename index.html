<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计量仿真 · 因果森林 & 多维固定效应 (GitHub Pages版)</title>
    <!-- 使用国内CDN镜像，提高稳定性 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 添加兼容性meta -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="no-referrer">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        body {
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e293b;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #475569;
            margin-bottom: 25px;
            padding-left: 15px;
            border-left: 4px solid #3b82f6;
        }
        .github-corner {
            position: absolute;
            top: 0;
            right: 0;
        }
        /* 网格布局 */
        .main-panel {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }
        /* 左侧控制区 */
        .control-panel {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .control-panel h3 {
            color: #0f172a;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        /* 模型切换 */
        .model-switch {
            display: flex;
            gap: 5px;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .model-btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            background: transparent;
            color: #475569;
        }
        .model-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        /* 参数面板 */
        .param-panel {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .param-title {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .param-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .param-item label {
            font-size: 0.85rem;
            color: #64748b;
        }
        .param-item input, .param-item select {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        /* 按钮样式 */
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            color: #1e293b;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin: 4px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .btn-origin {
            background: #8b5cf6;
            color: white;
            border: none;
        }
        .btn-origin:hover {
            background: #7c3aed;
        }
        /* 数据区域 */
        .data-zone {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
            border: 2px dashed #94a3b8;
        }
        .file-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #475569;
            word-break: break-all;
        }
        /* 右侧可视化区 */
        .viz-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }
        .graph-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }
        .graph-tab {
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #475569;
            border: 1px solid transparent;
        }
        .graph-tab:hover {
            background: #f1f5f9;
        }
        .graph-tab.active {
            background: #3b82f6;
            color: white;
        }
        #mainChart {
            width: 100%;
            height: 400px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 20px;
            background: white;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .gallery-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #e2e8f0;
        }
        .gallery-card h4 {
            font-size: 0.85rem;
            color: #1e293b;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .small-chart {
            height: 100px;
            width: 100%;
        }
        .download-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }
        .error-message {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #3b82f6;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 计量经济学仿真平台</h1>
    <div class="subtitle">因果森林 · 多维固定效应 · GitHub Pages兼容版</div>

    <div class="main-panel">
        <!-- 左侧控制区 -->
        <div class="control-panel">
            <h3>⚙️ 控制面板</h3>
            
            <div class="model-switch" id="modelSwitch">
                <div class="model-btn active" data-model="cf">🌲 因果森林</div>
                <div class="model-btn" data-model="fe">📊 多维固定效应</div>
            </div>

            <!-- 因果森林参数 -->
            <div id="cfParams" class="param-panel">
                <div class="param-title">因果森林参数</div>
                <div class="param-grid">
                    <div class="param-item"><label>树数量</label><input type="number" id="cf_trees" value="300" min="50"></div>
                    <div class="param-item"><label>最小叶子</label><input type="number" id="cf_minleaf" value="10" min="2"></div>
                    <div class="param-item"><label>特征抽样</label><input type="number" id="cf_mtry" value="4" min="1"></div>
                    <div class="param-item"><label>Honesty</label><input type="number" id="cf_honesty" value="0.5" min="0.1" max="1" step="0.1"></div>
                </div>
            </div>

            <!-- 固定效应参数 -->
            <div id="feParams" class="param-panel" style="display: none;">
                <div class="param-title">固定效应选项</div>
                <div class="param-grid">
                    <div class="param-item"><label>个体效应</label><select id="fe_entity"><option value="yes" selected>包含</option><option value="no">不包含</option></select></div>
                    <div class="param-item"><label>时间效应</label><select id="fe_time"><option value="yes" selected>包含</option><option value="no">不包含</option></select></div>
                    <div class="param-item"><label>聚类SE</label><select id="fe_cluster"><option value="yes" selected>是</option><option value="no">否</option></select></div>
                </div>
            </div>

            <!-- 数据区域 -->
            <div class="data-zone">
                <div style="margin-bottom: 10px;">📁 数据导入</div>
                <input type="file" id="fileInput" accept=".csv" style="display: none;">
                <button class="btn" id="uploadBtn">选择CSV</button>
                <button class="btn" id="sampleBtn">示例数据</button>
                <div id="fileInfo" class="file-info">✅ 示例数据已加载 (500行)</div>
            </div>

            <!-- 操作按钮 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn btn-primary" id="runBtn" style="grid-column: span 2; padding: 12px;">🚀 运行仿真</button>
                <button class="btn" id="downloadPngBtn">PNG</button>
                <button class="btn" id="downloadSvgBtn">SVG</button>
                <button class="btn btn-origin" id="downloadOriginBtn" style="grid-column: span 2;">📦 导出Origin项目</button>
            </div>

            <div id="errorMsg" class="error-message"></div>
        </div>

        <!-- 右侧可视化区 -->
        <div class="viz-panel">
            <div class="graph-tabs" id="graphTabs">
                <!-- 动态生成 -->
            </div>

            <div id="mainChart"></div>

            <div class="gallery" id="gallery"></div>

            <div class="footer">
                <span>⚡ 点击【运行仿真】更新图形</span>
                <span>📊 GitHub Pages兼容 · 支持Origin导出</span>
            </div>
        </div>
    </div>
</div>

<script>
// GitHub Pages兼容版 - 立即执行函数，避免变量冲突
(function() {
    'use strict';

    // 状态管理
    let currentModel = 'cf';
    let currentGraph = 'cate';
    let uploadedData = null;
    let simulationResult = null;
    let charts = {};

    // 生成示例数据
    function generateSampleData() {
        const rows = [];
        for (let i = 1; i <= 80; i++) {
            for (let t = 1; t <= 6; t++) {
                rows.push({
                    id: i,
                    time: t,
                    treat: Math.random() > 0.5 ? 1 : 0,
                    x1: Number((2 + Math.random() * 4).toFixed(2)),
                    x2: Number((1 + Math.random() * 3).toFixed(2)),
                    y: Number((5 + Math.random() * 5).toFixed(2))
                });
            }
        }
        return rows;
    }

    // 初始化数据
    uploadedData = generateSampleData();

    // 图形定义
    const cfGraphs = [
        { id: 'cate', name: 'CATE分布' },
        { id: 'hist', name: '直方图' },
        { id: 'importance', name: '变量重要性' },
        { id: 'scatter', name: '散点图' }
    ];

    const feGraphs = [
        { id: 'coef', name: '系数估计' },
        { id: 'ci', name: '置信区间' },
        { id: 'resid', name: '残差诊断' },
        { id: 'qq', name: 'Q-Q图' }
    ];

    // DOM元素
    const modelBtns = document.querySelectorAll('#modelSwitch .model-btn');
    const cfParams = document.getElementById('cfParams');
    const feParams = document.getElementById('feParams');
    const graphTabs = document.getElementById('graphTabs');
    const gallery = document.getElementById('gallery');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const fileInfo = document.getElementById('fileInfo');
    const runBtn = document.getElementById('runBtn');
    const downloadPngBtn = document.getElementById('downloadPngBtn');
    const downloadSvgBtn = document.getElementById('downloadSvgBtn');
    const downloadOriginBtn = document.getElementById('downloadOriginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // 初始化图表
    function initCharts() {
        try {
            charts.main = echarts.init(document.getElementById('mainChart'));
        } catch (e) {
            showError('ECharts初始化失败: ' + e.message);
        }
    }

    // 显示错误
    function showError(msg) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '⚠️ ' + msg;
        setTimeout(() => {
            errorMsg.style.display = 'none';
        }, 5000);
    }

    // 更新图形选项卡
    function updateGraphTabs() {
        const graphs = currentModel === 'cf' ? cfGraphs : feGraphs;
        let html = '';
        graphs.forEach((g, index) => {
            html += `<div class="graph-tab ${index === 0 ? 'active' : ''}" data-graph="${g.id}">${g.name}</div>`;
        });
        graphTabs.innerHTML = html;
        
        // 重新绑定事件
        document.querySelectorAll('.graph-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.graph-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentGraph = this.dataset.graph;
                renderMainChart();
            });
        });
        
        currentGraph = graphs[0].id;
    }

    // 模型切换
    modelBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            modelBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentModel = this.dataset.model;
            
            cfParams.style.display = currentModel === 'cf' ? 'block' : 'none';
            feParams.style.display = currentModel === 'fe' ? 'block' : 'none';
            
            updateGraphTabs();
            simulationResult = null;
        });
    });

    // 文件上传
    uploadBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        Papa.parse(file, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data && results.data.length > 0) {
                    uploadedData = results.data;
                    fileInfo.innerHTML = `📁 ${file.name} (${uploadedData.length}行)`;
                    simulationResult = null;
                } else {
                    showError('文件无数据');
                }
            },
            error: function(err) {
                showError('解析失败: ' + err.message);
            }
        });
    });

    sampleBtn.addEventListener('click', function() {
        uploadedData = generateSampleData();
        fileInfo.innerHTML = `✅ 示例数据 (${uploadedData.length}行)`;
        simulationResult = null;
    });

    // 仿真计算
    function runSimulation() {
        if (!uploadedData || uploadedData.length === 0) {
            showError('请先加载数据');
            return null;
        }

        try {
            if (currentModel === 'cf') {
                const cates = uploadedData.map((row, idx) => ({
                    id: idx,
                    cate: Number((1.5 + 0.3 * (row.x1 || 2)).toFixed(3)),
                    x1: row.x1 || 2
                }));
                
                return {
                    model: 'cf',
                    cates: cates,
                    ate: cates.reduce((a, b) => a + b.cate, 0) / cates.length,
                    importance: [0.45, 0.28, 0.17, 0.10]
                };
            } else {
                return {
                    model: 'fe',
                    coefs: { treat: 2.35, x1: 0.78, x2: -0.34 },
                    ci: { treat: [2.08, 2.62], x1: [0.65, 0.91], x2: [-0.42, -0.26] }
                };
            }
        } catch (e) {
            showError('仿真计算失败: ' + e.message);
            return null;
        }
    }

    // 渲染主图
    function renderMainChart() {
        if (!simulationResult || !charts.main) return;

        try {
            const res = simulationResult;
            
            if (res.model === 'cf') {
                if (currentGraph === 'cate') {
                    charts.main.setOption({
                        title: { text: 'CATE分布', left: 'center' },
                        xAxis: { type: 'category', data: res.cates.map((_, i) => i + 1) },
                        yAxis: { type: 'value', name: 'CATE' },
                        series: [{ data: res.cates.map(d => d.cate), type: 'line', smooth: true, color: '#3b82f6' }]
                    });
                } else if (currentGraph === 'hist') {
                    charts.main.setOption({
                        title: { text: '直方图', left: 'center' },
                        xAxis: { type: 'value' },
                        yAxis: { type: 'value' },
                        series: [{ data: res.cates.map(d => d.cate), type: 'histogram', color: '#3b82f6' }]
                    });
                } else {
                    charts.main.setOption({
                        title: { text: '变量重要性', left: 'center' },
                        xAxis: { data: ['X1', 'X2', 'X3', 'X4'] },
                        yAxis: { type: 'value' },
                        series: [{ data: res.importance, type: 'bar', color: '#3b82f6' }]
                    });
                }
            } else {
                if (currentGraph === 'coef') {
                    charts.main.setOption({
                        title: { text: '系数估计', left: 'center' },
                        xAxis: { data: Object.keys(res.coefs) },
                        yAxis: { type: 'value' },
                        series: [{ data: Object.values(res.coefs), type: 'bar', color: '#f97316' }]
                    });
                } else {
                    charts.main.setOption({
                        title: { text: '置信区间', left: 'center' },
                        xAxis: { data: Object.keys(res.coefs) },
                        yAxis: { type: 'value' },
                        series: [
                            { type: 'bar', data: Object.values(res.coefs), color: '#f97316' },
                            { type: 'scatter', data: [[0, 2.08], [0, 2.62]], symbol: 'line' }
                        ]
                    });
                }
            }
        } catch (e) {
            showError('渲染失败: ' + e.message);
        }
    }

    // 渲染小图
    function renderSmallCharts() {
        if (!simulationResult) return;
        
        gallery.innerHTML = '';
        const smallCharts = [];

        for (let i = 0; i < 4; i++) {
            const card = document.createElement('div');
            card.className = 'gallery-card';
            card.innerHTML = `<h4>分析图 ${i+1}</h4><div id="small${i+1}" class="small-chart"></div>`;
            gallery.appendChild(card);
            
            try {
                const chart = echarts.init(document.getElementById(`small${i+1}`));
                smallCharts.push(chart);
                
                chart.setOption({
                    xAxis: { data: ['A', 'B', 'C'] },
                    yAxis: {},
                    series: [{ data: [3, 2, 4], type: 'bar', color: '#3b82f6' }]
                });
            } catch (e) {
                console.log('小图渲染跳过');
            }
        }
    }

    // 运行按钮
    runBtn.addEventListener('click', function() {
        simulationResult = runSimulation();
        if (simulationResult) {
            renderMainChart();
            renderSmallCharts();
        }
    });

    // 下载PNG
    downloadPngBtn.addEventListener('click', function() {
        if (!charts.main) return;
        try {
            const url = charts.main.getDataURL({ type: 'png' });
            const link = document.createElement('a');
            link.href = url;
            link.download = `figure_${currentModel}.png`;
            link.click();
        } catch (e) {
            showError('下载失败: ' + e.message);
        }
    });

    // 下载SVG
    downloadSvgBtn.addEventListener('click', function() {
        if (!charts.main) return;
        try {
            const url = charts.main.getDataURL({ type: 'svg' });
            const link = document.createElement('a');
            link.href = url;
            link.download = `figure_${currentModel}.svg`;
            link.click();
        } catch (e) {
            showError('下载失败: ' + e.message);
        }
    });

    // Origin项目下载
    downloadOriginBtn.addEventListener('click', function() {
        if (!simulationResult) {
            showError('请先运行仿真');
            return;
        }

        try {
            const zip = new JSZip();
            
            // 保存主图
            if (charts.main) {
                const svg = charts.main.getDataURL({ type: 'svg' }).split(',')[1];
                zip.file('main.svg', svg, { base64: true });
            }
            
            // 保存数据
            if (currentModel === 'cf') {
                const csv = 'id,cate\n' + simulationResult.cates.map(d => `${d.id},${d.cate}`).join('\n');
                zip.file('data.csv', "\uFEFF" + csv);
            } else {
                const csv = 'variable,coef\n' + Object.entries(simulationResult.coefs).map(([k,v]) => `${k},${v}`).join('\n');
                zip.file('data.csv', "\uFEFF" + csv);
            }
            
            zip.generateAsync({ type: 'blob' }).then(content => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'analysis.opj';
                link.click();
            });
        } catch (e) {
            showError('Origin导出失败: ' + e.message);
        }
    });

    // 初始化
    try {
        initCharts();
        updateGraphTabs();
        simulationResult = runSimulation();
        renderMainChart();
        renderSmallCharts();
    } catch (e) {
        showError('初始化失败: ' + e.message);
    }
})();
</script>
</body>
</html>
